<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./img/coffee.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="style.css">
    <title>mi wishlist</title>
</head>
<body>
    <div id="loader-screen">
        <div class="coffee-loader"><i class="fa-solid fa-mug-saucer" style="color: rgb(178, 125, 62);"></i></div>
            <p>loading your coffee...</p>
    </div>
    <section class="fade-in">
        <!-- navbar -->
        <nav class="navbar sticky-top" style="background-color:#fff8f0;">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                <img src="./img/dc.png" alt="Logo" width="50" height="50" class="d-inline-block align-text-center">
                xime's coffee diary
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="index.html" class="nav-link-custom me-3">inicio</a>
                <a href="wishlist.html" class="nav-link-custom">xime's wishlist</a>
                <div id="auth-links"></div>
            </div>
            </div>
        </nav>
        
        <h2 id="tituloWishlist" class="mb-4">wishlist</h2>
        <!-- cards -->
         <div class="container mt-5">
            <div class="row" id="wishlist-container">
            </div>
         </div>

         <!-- formulario -->
        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card card-form shadow-sm p-4">
                        <h3 class="text-center">Añade una cafetería:</h3>
                        <form id="formWishlist">
                            <div class="mb-3">
                                <input type="text" id="cafeteria" placeholder="Nombre de la cafetería: " required>
                            </div>
                            <div class="mb-3">
                                <input type="text" id="ubicacion" placeholder="Ubicación de la cafe">
                            </div>
                            <div class="mb-3">
                                <input type="text" id="nota" placeholder="¿Por qué quieres ir?">
                            </div>
                            <div class="mb-3">
                                <input type="text" id="imagen" placeholder="Url de la imagen">
                            </div>
                            <button type="submit">Agregar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- modal -->
        <div class="modal fade" id="editarModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title">Editar cafetería</h3>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editForm">
                           <input type="hidden" id="editId">
                            <div class="mb-3">
                               <input type="text" id="editCafeteria" class="form-control" placeholder="Nombre de la cafetería" required>
                             </div>
                             <div class="mb-3">
                                <input type="text" id="editUbicacion" class="form-control" placeholder="Ubicación de la cafe">
                            </div>
                            <div class="mb-3">
                                <input type="text" id="editNota" class="form-control" placeholder="¿Por qué quieres ir?">
                            </div>
                            <div class="mb-3">
                                <input type="text" id="editImagen" class="form-control" placeholder="Url de la imagen">
                            </div>
                            <button type="submit" class="btn w-100" style="background-color:#D9B681;">Guardar cambios</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

     <!-- footer -->
     <footer class=" custom-footer text-center mt-5">
        <p> keep drinking coffee - by xime 2026 </p>
     </footer>
    <!-- toastify -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
     <!-- sweetalert2-->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- js -->
     <script>
        const API = "https://coffee-back-y739.onrender.com/api/wishlist"
        const token = localStorage.getItem("token")
        const nombre = localStorage.getItem("nombre")
        const titulo = document.getElementById("tituloWishlist")
        const authDiv = document.getElementById("auth-links")
        
        if(token) {
            authDiv.innerHTML = `
            <a href="#" class="nav-link-custom ms-2" onclick="logout()">logout</a> `
        } else {
            authDiv.innerHTML = `
            <a href="login.html" class="nav-link-custom ms-2">login</a>
            <a href="register.html" class="nav-link-custom ms-2">register</a> `
        } 

        function logout() {
            localStorage.removeItem("token")
            localStorage.removeItem("userId")
           
            Toastify({
                text: "Sesión cerrada correctamente",
                duration: 2000,
                gravity: "top",
                position: "right",
            style: {
                background: "#7A8C66",
                borderRadius: "10px",
                fontFamily: "Funnel Display"
                }
            }).showToast()

            setTimeout(() => {
                window.location.href = "index.html"
            }, 1800)
        }

        if (nombre) {
            titulo.textContent = `${nombre}'s wishlist `
        }

        // si no hay token, pasamos a login porque ahí se crea
        if (!token) {
            window.location.href = 'login.html'
        }

        // obtengo wishlist
        async function cargarWishlist() {
            const res = await fetch(API, {
                headers: {
                    "Authorization": "Bearer " + token
                }
            })

            const data = await res.json()
            const contenedor = document.getElementById("wishlist-container")
            contenedor.innerHTML = ""

            data.forEach(item => {
                contenedor.innerHTML += `
                 <div class="col-md-4 mb-4">
                    <div class="card wishlist-card h-100 shadow-sm">
                        <img src="${item.imagen}" class="card-img-top" onerror="this.src='img/image.png'">
                        <div class="card-body text-center">
                            <h5 class="card-title">${item.cafeteria}</h5>
                            <p class="card-text">📍${item.ubicacion || ""}</p>
                            <p class="card-text">${item.nota || ""}</p>
                            <p>
                                <span class="badge ${item.visitado ? 'bg-success' : 'bg-warning text-dark'}">
                                ${item.visitado 
                                ? '<i class="bi bi-check-circle"></i> Visitado' 
                                : '<i class="bi bi-clock"></i> Pendiente'}
                                </span>
                            </p>
                            <button class="btn btn-sm mt-2" style="background-color: #D5B185;" onclick="toggleVisitado('${item._id}', ${item.visitado})">
                            ${item.visitado? "Marcar como no visitado": "Marcar como visitado"} </button>                            
                            <button class="btn btn-sm mt-2" style="background-color: #fff8f0;"
                                onclick="editar('${item._id}', '${item.cafeteria}', '${item.ubicacion}', '${item.nota}', '${item.imagen}')">
                                Editar
                            </button>
                            <button class="btn btn-sm mt-2" style="background-color: #EDABA8"
                                onclick="eliminar('${item._id}')">
                                Eliminar
                            </button>
                            
                        </div>
                    </div>
                </div>`
            })
        }

        document.getElementById("formWishlist").addEventListener("submit", async(e) => {
            e.preventDefault()
            const cafeteria = document.getElementById("cafeteria").value.trim()
            const ubicacion = document.getElementById("ubicacion").value
            const nota = document.getElementById("nota").value
            const imagen = document.getElementById("imagen").value

            if(!cafeteria){
                 Toastify({
                    text: "Debe escribir una cafetería",
                    duration: 2000,
                    gravity: "top",
                    position: "right",
                    stopOnFocus: true,
                    close: true,
                    style: {
                        background: "#D88C8C",
                        borderRadius: "10px",
                        fontFamily: "Funnel Display"
                    }   
                }).showToast()
                return
            }

            // añadir wishlist
            const res = await fetch(API, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({cafeteria, ubicacion, nota, imagen})
            })

            const data = await res.json()

            if (res.ok) {
                Toastify({
                    text: "Cafetería agregada a la wishlist :)",
                    duration: 2000,
                    gravity: "top",
                    position: "right",
                    stopOnFocus: true,
                    style: {
                        background: "#7A8C66",
                        borderRadius: "10px",
                        fontFamily: "Funnel Display"
                    }   
                }).showToast()

            e.target.reset()
            cargarWishlist()
            } else {
                Toastify({
                    text: data.message || "Error",
                    duration: 2000,
                    gravity: "top",
                    position: "right",
                    stopOnFocus: true,
                    style: {
                        background: "#D88C8C",
                        borderRadius: "10px",
                        fontFamily: "Funnel Display"
                    }   
                }).showToast()
            }
        })

        async function toggleVisitado(id, estadoActual) {
            await fetch(`${API}/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    visitado: !estadoActual
                })
            })
            
            cargarWishlist()
        }
        // editar wishlist
       function editar(id, cafeteria, ubicacion, nota, imagen) {
            document.getElementById("editId").value = id
            document.getElementById("editCafeteria").value = cafeteria.trim()
            document.getElementById("editUbicacion").value = ubicacion
            document.getElementById("editNota").value = nota
            document.getElementById("editImagen").value = imagen

            const modal = new bootstrap.Modal(
                document.getElementById("editarModal")
            )
            modal.show()
        }
        document.getElementById("editForm")

        .addEventListener("submit", async(e) => {
            e.preventDefault()

            const id = document.getElementById("editId").value
            const cafeteria = document.getElementById("editCafeteria").value
            const ubicacion = document.getElementById("editUbicacion").value
            const nota = document.getElementById("editNota").value
            const imagen = document.getElementById("editImagen").value

            if (!cafeteria.trim()) {
                Toastify({
                    text: "Escribe el nombre de la cafetería",
                    duration: 2000,
                    gravity: "top",
                    position: "right",
                    stopOnFocus: true,
                    style: {
                        background: "#D88C8C",
                        borderRadius: "10px",
                        fontFamily: "Funnel Display"
                    }   
                }).showToast() 
                return
            }

            await fetch(`${API}/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    cafeteria,
                    ubicacion,
                    nota,
                    imagen
                })
            })

            const modal = bootstrap.Modal.getInstance(
                document.getElementById("editarModal")
            )

            modal.hide()
            Toastify({
                    text: "Cambios guardados correctamente",
                    duration: 2000,
                    gravity: "top",
                    position: "right",
                    stopOnFocus: true,
                    style: {
                        background: "#D9b681",
                        borderRadius: "10px",
                        fontFamily: "Funnel Display"
                    }   
                }).showToast()
            cargarWishlist()
        })

        // eliminar wishlist
        async function eliminar(id) {

            const resultado = await Swal.fire({
                title: "¿Eliminar cafetería?",
                text: "Esta acción no se puede deshacer ¡!",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#7A8C66",
                cancelButtonColor: "#D88C8C",
                confirmButtonText: "Sí, eliminar",
                cancelButtonText: "Cancelar"
    })

        if(!resultado.isConfirmed) {
            return
        }

            const res = await fetch(`${API}/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            })

            const data = await res.json()

            if(res.ok) {
                Toastify({
                    text: data.mensaje,
                    duration: 2000,
                    gravity: "top",
                    position: "right",
                    style: {
                        background: "#7A8C66",
                        borderRadius: "10px",
                        fontFamily: "Funnel Display"
                    }
                }). showToast()
            cargarWishlist()
            } else {
                Toastify({
                    text: data.message || "No se pudo eliminar",
                    duration: 2000,
                    gravity: "top",
                    position: "right",
                    style: {
                        background: "#D88C8C",
                        borderRadius: "10px",
                        fontFamily: "Funnel Display"
                    }
                }). showToast()
            }
        }
        cargarWishlist()
        
        // loading
        window.addEventListener("load", () => {
            setTimeout(() => {
                document.getElementById("loader-screen").classList.add("hide")
            }, 1200)
    })

     </script>
</body>
</html>
