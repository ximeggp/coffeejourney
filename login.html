<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="shortcut icon" href="./img/coffee.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <section class="fade-in">
    <div class="card p-4 shadow" style="width: 350px;">
        <h2 class="mb-3">login</h2>

        <form id="loginForm">
            <input type="email"  id="email" class="form-control mb-3" placeholder="Escribe tu email" required>
            <input type="password"  id="password" class="form-control mb-3" placeholder="Escribe tu contraseña" required>
            <button class="btn w-100" style="background-color: #fff8f0;">Ingresar</button>
        </form>

        <p class="mt-3 text-center card-text">¿No tienes cuenta aún?, <a href="register.html">regístrate</a></p>
    </div>
</section> 
    <!-- toastify -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        const API = "https://coffee-back-y739.onrender.com/api/users/login"

        document.getElementById("loginForm").addEventListener("submit", async(e) => {
            e.preventDefault()

            const email = document.getElementById("email").value
            const password = document.getElementById("password").value

            const res = await fetch(API, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({email,password})
            })

            const data = await res.json()

            if(res.ok) {
                localStorage.setItem("token", data.token)
                localStorage.setItem("userId", data._id)
                localStorage.setItem("nombre", data.nombre)
                window.location.href = "index.html"
            } else {
                Toastify({
                    text: data.message || "Error al iniciar sesión",
                    duration: 3000,
                    gravity: "top",
                    position: "center",
                    stopOnFocus: true,
                    close: true,
                    style: {
                        background: "#D88C8C",
                        borderRadius: "10px",
                        fontFamily: "Funnel Display"
                    }
                }).showToast()
            }
        })
    </script>


</body>
</html>
